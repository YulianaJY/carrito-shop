<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tienda de Donas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f4f4;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>
<body>

<div class="login-box">

<h3 class="text-center mb-4">Login</h3>

<input type="text" id="usuario" class="form-control mb-3" placeholder="Usuario">

<input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

<button class="btn btn-dark w-100" onclick="login()">Entrar</button>

<p id="error" class="text-danger text-center mt-3"></p>

</div>

<script>

function login(){

let usuario = document.getElementById("usuario").value
let password = document.getElementById("password").value

if(usuario === "admin" && password === "1234"){

localStorage.setItem("login","true")

window.location.href="index.html"

}else{

document.getElementById("error").innerText="Usuario o contraseña incorrectos"

}

}

</script>

</body>
</html>

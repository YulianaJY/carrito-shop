<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tienda de Donas Yuls</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #FFF8F0;
  --blush: #FFD6C0;
  --caramel: #E8956D;
  --chocolate: #3D1A0E;
  --mocha: #7B3F2A;
  --glaze: #F4A97F;
  --sprinkle-1: #FF6B9D;
  --sprinkle-2: #A8D8EA;
  --sprinkle-3: #FFE66D;
  --sprinkle-4: #95E1D3;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background-color: var(--chocolate);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated background blobs */
.bg-blobs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.25;
  animation: blobFloat 12s ease-in-out infinite;
}

.blob-1 {
  width: 500px; height: 500px;
  background: var(--caramel);
  top: -150px; left: -150px;
  animation-delay: 0s;
}
.blob-2 {
  width: 400px; height: 400px;
  background: var(--sprinkle-1);
  bottom: -100px; right: -100px;
  animation-delay: -4s;
}
.blob-3 {
  width: 300px; height: 300px;
  background: var(--sprinkle-3);
  top: 40%; left: 60%;
  animation-delay: -8s;
}

@keyframes blobFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -40px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(0.97); }
}

/* Floating sprinkles */
.sprinkles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.sprinkle {
  position: absolute;
  width: 6px;
  height: 18px;
  border-radius: 3px;
  animation: sprinkleFall linear infinite;
  opacity: 0.5;
}

@keyframes sprinkleFall {
  0% { transform: translateY(-30px) rotate(var(--r)); opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { transform: translateY(100vh) rotate(calc(var(--r) + 360deg)); opacity: 0; }
}

/* Card */
.card-wrap {
  position: relative;
  z-index: 10;
  animation: cardAppear 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translateY(40px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card {
  background: var(--cream);
  width: 420px;
  border-radius: 28px;
  overflow: hidden;
  box-shadow:
    0 4px 6px rgba(0,0,0,0.07),
    0 20px 60px rgba(0,0,0,0.35),
    0 0 0 1px rgba(255,255,255,0.06);
}

/* Header strip */
.card-header {
  background: var(--chocolate);
  padding: 36px 40px 28px;
  position: relative;
  overflow: hidden;
}

.card-header::before {
  content: '';
  position: absolute;
  width: 240px; height: 240px;
  background: radial-gradient(circle, var(--caramel) 0%, transparent 70%);
  top: -80px; right: -60px;
  opacity: 0.4;
}

.donut-icon {
  font-size: 3rem;
  display: block;
  margin-bottom: 10px;
  animation: donutSpin 8s linear infinite;
  transform-origin: center;
}

@keyframes donutSpin {
  0%, 90% { transform: rotate(0deg); }
  95% { transform: rotate(15deg); }
  100% { transform: rotate(0deg); }
}

.brand-name {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 1.75rem;
  color: var(--cream);
  line-height: 1;
  letter-spacing: -0.03em;
}

.brand-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 0.9rem;
  color: var(--glaze);
  margin-top: 4px;
  letter-spacing: 0.02em;
}

/* Body */
.card-body {
  padding: 36px 40px 40px;
}

/* Tabs */
.tab-switcher {
  display: flex;
  background: #EDE0D4;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}

.tab-btn {
  flex: 1;
  padding: 9px;
  border: none;
  background: transparent;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 0.875rem;
  color: var(--mocha);
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.01em;
}

.tab-btn.active {
  background: var(--chocolate);
  color: var(--cream);
  box-shadow: 0 2px 8px rgba(61,26,14,0.3);
}

/* Forms */
.form-panel {
  display: none;
  animation: slideUp 0.3s ease both;
}
.form-panel.active {
  display: block;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--mocha);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.input-wrap {
  position: relative;
}

.input-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--caramel);
  width: 16px; height: 16px;
  pointer-events: none;
}

.input-wrap input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  border: 2px solid #E8D8CC;
  border-radius: 12px;
  background: #FDFAF7;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  color: var(--chocolate);
  transition: all 0.2s ease;
  outline: none;
}

.input-wrap input::placeholder {
  color: #C4A898;
}

.input-wrap input:focus {
  border-color: var(--caramel);
  background: white;
  box-shadow: 0 0 0 4px rgba(232,149,109,0.12);
}

/* Submit button */
.btn-submit {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--chocolate);
  color: var(--cream);
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: 0.01em;
  cursor: pointer;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.btn-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--caramel), var(--mocha));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.btn-submit:hover::before {
  opacity: 1;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(61,26,14,0.4);
}

.btn-submit:active {
  transform: translateY(0);
}

.btn-submit span {
  position: relative;
  z-index: 1;
}

/* Error */
.msg {
  min-height: 18px;
  font-size: 0.82rem;
  font-weight: 500;
  text-align: center;
  margin-top: 14px;
  border-radius: 8px;
  padding: 0 8px;
  transition: all 0.3s ease;
}

.msg.error {
  color: #C0392B;
  background: #FDECEA;
  padding: 8px 12px;
}

.msg.success {
  color: #1A7A4A;
  background: #E9F7EF;
  padding: 8px 12px;
}

/* Divider dots */
.dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 20px;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #D4C0B0;
}

.dot:nth-child(2) { background: var(--caramel); transform: scale(1.3); }
</style>
</head>

<body>

<!-- Background -->
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="sprinkles" id="sprinkles"></div>

<!-- Card -->
<div class="card-wrap">
  <div class="card">

    <div class="card-header">
      <span class="donut-icon">🍩</span>
      <div class="brand-name">Donas Yuls</div>
      <div class="brand-sub">dulce desde el primer bocado</div>
    </div>

    <div class="card-body">

      <div class="tab-switcher">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Crear cuenta</button>
      </div>

      <!-- Login -->
      <div class="form-panel active" id="panel-login">
        <div class="field">
          <label>Usuario</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="loginUser" placeholder="tu usuario">
          </div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••">
          </div>
        </div>
        <button class="btn-submit" onclick="login()"><span>Entrar →</span></button>
      </div>

      <!-- Register -->
      <div class="form-panel" id="panel-register">
        <div class="field">
          <label>Usuario</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="regUser" placeholder="tu usuario">
          </div>
        </div>
        <div class="field">
          <label>Correo</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <input type="email" id="regEmail" placeholder="tu@correo.com">
          </div>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div class="input-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="regPassword" placeholder="••••••••">
          </div>
        </div>
        <button class="btn-submit" onclick="registrar()"><span>Crear cuenta →</span></button>
      </div>

      <p class="msg" id="error"></p>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>
  </div>
</div>

<script>

// Sprinkles
const colors = ['#FF6B9D','#A8D8EA','#FFE66D','#95E1D3','#FFB347','#C3A6FF'];
const container = document.getElementById('sprinkles');
for (let i = 0; i < 28; i++) {
  const s = document.createElement('div');
  s.className = 'sprinkle';
  s.style.cssText = `
    left: ${Math.random()*100}%;
    background: ${colors[Math.floor(Math.random()*colors.length)]};
    --r: ${Math.random()*360}deg;
    animation-duration: ${6 + Math.random()*10}s;
    animation-delay: ${-Math.random()*16}s;
    width: ${4 + Math.random()*4}px;
    height: ${12 + Math.random()*10}px;
    opacity: ${0.3 + Math.random()*0.4};
  `;
  container.appendChild(s);
}

// Tab switch
function switchTab(tab) {
  document.getElementById('panel-login').classList.remove('active');
  document.getElementById('panel-register').classList.remove('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('tab-register').classList.remove('active');
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  clearMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('error');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function clearMsg() {
  const el = document.getElementById('error');
  el.textContent = '';
  el.className = 'msg';
}

function registrar() {
  const email = document.getElementById('regEmail').value.trim();

  if (!email) { showMsg('Ingresa tu correo', 'error'); return; }

  let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
  if (usuarios.find(u => u.email === email)) { showMsg('Este correo ya está registrado', 'error'); return; }

  usuarios.push({ email });
  localStorage.setItem('usuarios', JSON.stringify(usuarios));
  showMsg('¡Cuenta creada! Ya puedes entrar 🍩', 'success');
  setTimeout(() => switchTab('login'), 1400);
}

function login() {
  const email = document.getElementById('loginEmail').value.trim();

  if (!email) { showMsg('Ingresa tu correo', 'error'); return; }

  let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
  const usuario = usuarios.find(u => u.email === email);

  if (usuario) {
    localStorage.setItem('login', 'true');
    showMsg('¡Bienvenido/a! Entrando… 🍩', 'success');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } else {
    showMsg('Correo no registrado', 'error');
  }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tienda de Donas Yuls</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial, Helvetica, sans-serif;
}

.login-box{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:15px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
backdrop-filter: blur(10px);
animation:fadeIn 0.6s ease;
}

h3{
font-weight:700;
color:#333;
}

.input-group{
margin-bottom:15px;
}

.form-control{
border-radius:10px;
}

.btn-dark{
border-radius:10px;
padding:10px;
transition:0.3s;
}

.btn-dark:hover{
transform:scale(1.05);
background:#222;
}

.btn-success{
border-radius:10px;
padding:10px;
transition:0.3s;
}

.btn-success:hover{
transform:scale(1.05);
}

.link{
cursor:pointer;
color:#6c63ff;
font-weight:600;
}

.link:hover{
text-decoration:underline;
}

#error{
min-height:20px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-4">🍩 Tienda de Donas Yuls</h3>

<!-- LOGIN -->

<div id="loginForm">

<div class="input-group">
<span class="input-group-text"><i class="bi bi-envelope"></i></span>
<input type="email" id="loginEmail" class="form-control" placeholder="Correo">
</div>

<div class="input-group">
<span class="input-group-text"><i class="bi bi-lock"></i></span>
<input type="password" id="loginPassword" class="form-control" placeholder="Contraseña">
</div>

<button class="btn btn-dark w-100" onclick="login()">Entrar</button>

<p class="text-center mt-3">
¿No tienes cuenta?
<span class="link" onclick="mostrarRegistro()">Crear cuenta</span>
</p>

</div>

<!-- REGISTRO -->

<div id="registerForm" style="display:none;">

<div class="input-group">
<span class="input-group-text"><i class="bi bi-envelope"></i></span>
<input type="email" id="regEmail" class="form-control" placeholder="Correo">
</div>

<div class="input-group">
<span class="input-group-text"><i class="bi bi-lock"></i></span>
<input type="password" id="regPassword" class="form-control" placeholder="Contraseña">
</div>

<button class="btn btn-success w-100" onclick="registrar()">Crear cuenta</button>

<p class="text-center mt-3">
¿Ya tienes cuenta?
<span class="link" onclick="mostrarLogin()">Entrar</span>
</p>

</div>

<p id="error" class="text-danger text-center mt-3"></p>

</div>

<script>

function mostrarRegistro(){
document.getElementById("loginForm").style.display="none"
document.getElementById("registerForm").style.display="block"
document.getElementById("error").innerText=""
}

function mostrarLogin(){
document.getElementById("loginForm").style.display="block"
document.getElementById("registerForm").style.display="none"
document.getElementById("error").innerText=""
}

function registrar(){

let email=document.getElementById("regEmail").value
let password=document.getElementById("regPassword").value

if(email==="" || password===""){
document.getElementById("error").innerText="Completa todos los campos"
return
}

let usuarios=JSON.parse(localStorage.getItem("usuarios")) || []

let existe=usuarios.find(u=>u.email===email)

if(existe){
document.getElementById("error").innerText="Este correo ya está registrado"
return
}

usuarios.push({email:email,password:password})

localStorage.setItem("usuarios",JSON.stringify(usuarios))

document.getElementById("error").innerText="Cuenta creada correctamente"

mostrarLogin()

}

function login(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPassword").value

let usuarios=JSON.parse(localStorage.getItem("usuarios")) || []

let usuario=usuarios.find(u=>u.email===email && u.password===password)

if(usuario){

localStorage.setItem("login","true")

window.location.href="index.html"

}else{

document.getElementById("error").innerText="Correo o contraseña incorrectos"

}

}

</script>

</body>
</html>

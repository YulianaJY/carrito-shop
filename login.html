<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tienda de Donas Yuls</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:360px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.link{
cursor:pointer;
color:#0d6efd;
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-4">Tienda de Donas Yuls 🍩</h3>

<!-- LOGIN -->

<div id="loginForm">

<input type="email" id="loginEmail" class="form-control mb-3" placeholder="Correo">

<input type="password" id="loginPassword" class="form-control mb-3" placeholder="Contraseña">

<button class="btn btn-dark w-100" onclick="login()">Entrar</button>

<p class="text-center mt-3">
¿No tienes cuenta?
<span class="link" onclick="mostrarRegistro()">Crear cuenta</span>
</p>

</div>

<!-- REGISTRO -->

<div id="registerForm" style="display:none;">

<input type="email" id="regEmail" class="form-control mb-3" placeholder="Correo">

<input type="password" id="regPassword" class="form-control mb-3" placeholder="Contraseña">

<button class="btn btn-success w-100" onclick="registrar()">Crear cuenta</button>

<p class="text-center mt-3">
¿Ya tienes cuenta?
<span class="link" onclick="mostrarLogin()">Entrar</span>
</p>

</div>

<p id="error" class="text-danger text-center mt-3"></p>

</div>

<script>

function mostrarRegistro(){
document.getElementById("loginForm").style.display="none"
document.getElementById("registerForm").style.display="block"
document.getElementById("error").innerText=""
}

function mostrarLogin(){
document.getElementById("loginForm").style.display="block"
document.getElementById("registerForm").style.display="none"
document.getElementById("error").innerText=""
}

function registrar(){

let email = document.getElementById("regEmail").value
let password = document.getElementById("regPassword").value

if(email === "" || password === ""){
document.getElementById("error").innerText="Completa todos los campos"
return
}

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || []

let existe = usuarios.find(u => u.email === email)

if(existe){
document.getElementById("error").innerText="Este correo ya está registrado"
return
}

usuarios.push({email:email,password:password})

localStorage.setItem("usuarios",JSON.stringify(usuarios))

document.getElementById("error").innerText="Cuenta creada correctamente"

mostrarLogin()

}

function login(){

let email = document.getElementById("loginEmail").value
let password = document.getElementById("loginPassword").value

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || []

let usuario = usuarios.find(u => u.email === email && u.password === password)

if(usuario){

localStorage.setItem("login","true")

window.location.href="index.html"

}else{

document.getElementById("error").innerText="Correo o contraseña incorrectos"

}

}

</script>

</body>
</html>
